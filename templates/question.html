<!-- question.html -->
<!DOCTYPE html>
<html>
<head>
    <title>{{ question.title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="progress">{{ progress }}</div>
        <h1>{{ question.title }}</h1>
        <div class="question-desc">{{ question.description }}</div>
        
        <h3>Example Test Cases:</h3>
        <ul class="test-cases">
            {% for case in question.test_cases %}
            <li><code>{{ case.input }}</code> → {{ case.expected }}</li>
            {% endfor %}
        </ul>
        
        <form method="POST">
            <input type="hidden" name="email" value="{{ email }}">
            <textarea name="code" placeholder="def {{ question.title.split(' ')[0].lower() }}(...):&#10;    # Your code here" required></textarea>
            <button type="submit" class="btn">
                {% if question.id == questions[-1].id %}Submit Final Answer{% else %}Next Question{% endif %}
            </button>
        </form>
    </div>
</body>
</html>
